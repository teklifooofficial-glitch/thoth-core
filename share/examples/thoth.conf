# Thoth (TTH) - sample configuration file

# Network
testnet=0
regtest=0

# RPC settings
server=1
rpcuser=thothuser
rpcpassword=REPLACE_WITH_STRONG_PASSWORD
rpcport=19332
rpcallowip=127.0.0.1

# Connections (use [main] / [test] / [regtest] sections for network-specific ports)
port=19333
maxconnections=16

# Mining: gen= is not supported. To mine locally, use RPC generatetoaddress
# (requires a loaded wallet for getnewaddress, or pass any valid address):
#   ADDR=$(./src/thoth-cli getnewaddress)
#   ./src/thoth-cli generatetoaddress 1 "$ADDR" 1000000

# Logging
debug=0
printtoconsole=0

# Data directory (optional)
# datadir=/home/USER/.thoth
